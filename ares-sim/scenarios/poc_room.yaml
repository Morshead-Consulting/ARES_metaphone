# ARES Capture Simulation — PoC Room Configuration
# ARES-SIM-001 v1.0
#
# Representative conference/operations room at ARES wargame scale.
# Dimensions chosen to match a typical medium briefing room; absorption
# coefficient 0.3 is a mid-range value for a furnished room with soft
# furnishings and acoustic tiles.

room:
  dimensions: [8.0, 6.0, 3.0]   # metres: length x width x height
  absorption: 0.30               # scalar wall absorption coefficient
  sample_rate: 16000             # Hz — matches ARES ASR pipeline
  max_order: 12                  # image-source reflection order (spec §2.1)

# 5 participant seats arranged around a rectangular table.
# z=1.2 m is approximate seated mouth height (spec §3.3).
# Each seat maps to a participant; the 5th is placed at the head.
seats:
  - id: seat_01
    position: [2.0, 1.5, 1.2]
    label: "Blue Commander"
    team: blue

  - id: seat_02
    position: [2.0, 4.5, 1.2]
    label: "Blue Deputy"
    team: blue

  - id: seat_03
    position: [4.0, 1.5, 1.2]
    label: "Red Commander"
    team: red

  - id: seat_04
    position: [4.0, 4.5, 1.2]
    label: "Red Deputy"
    team: red

  - id: seat_05
    position: [6.0, 3.0, 1.2]
    label: "Chief Umpire"
    team: umpire

# Candidate microphone array placements evaluated in the sweep.
# Each placement is a list of mic positions + a pattern type.
# Patterns: "omni" | "hypercardioid"
mic_placements:
  - id: placement_boundary_omni
    description: "4-mic boundary omni array on ceiling centre"
    pattern: omni
    positions:
      - [3.5, 2.5, 2.9]
      - [3.5, 3.5, 2.9]
      - [4.5, 2.5, 2.9]
      - [4.5, 3.5, 2.9]

  - id: placement_per_seat_hypercardioid
    description: "Per-seat hypercardioid mic at each position (pointed upward/inward)"
    pattern: hypercardioid
    positions:
      - [2.0, 1.5, 0.85]
      - [2.0, 4.5, 0.85]
      - [4.0, 1.5, 0.85]
      - [4.0, 4.5, 0.85]
      - [6.0, 3.0, 0.85]

  - id: placement_hybrid
    description: "2 ceiling omni + 3 per-seat hypercardioid (table ends + umpire)"
    pattern: hypercardioid
    positions:
      - [3.0, 3.0, 2.9]   # ceiling omni 1 (omni — overridden per-mic below)
      - [5.0, 3.0, 2.9]   # ceiling omni 2
      - [2.0, 1.5, 0.85]  # seat 1 hypercardioid
      - [4.0, 1.5, 0.85]  # seat 3 hypercardioid
      - [6.0, 3.0, 0.85]  # seat 5 hypercardioid
